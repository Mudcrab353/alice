<!-- ============================================================
     SIDEBAR
     ============================================================ -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">A</div>
    <div class="sidebar-logo-text">
      <div class="sidebar-logo-name">Alice</div>
      <div class="sidebar-logo-ver">v%%VERSION%%</div>
    </div>
  </div>

  <div class="sidebar-nav">
    <div class="sidebar-section">Navigation</div>
    <div class="sidebar-item active" data-page="viewer" data-tip="Browse, annotate and edit dataset images with AI-assisted detection." onclick="switchPage('viewer')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Viewer</span>
    </div>
    <div style="height:1px;background:var(--bd);margin:2px 10px"></div>
    <div class="sidebar-item" data-page="trainer" data-tip="Training pipeline: export snapshots, deduplicate, train model, export ONNX." onclick="switchPage('trainer')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/></svg>
      <span>Trainer</span>
    </div>
    <div style="height:1px;background:var(--bd);margin:2px 10px"></div>
    <div class="sidebar-item" data-page="settings" data-tip="Configure paths, AI defaults, training parameters. Saved to alice.conf." onclick="switchPage('settings')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </div>

    <div style="height:1px;background:var(--bd);margin:8px 10px"></div>
    <div id="sourceSection">
      <div class="sidebar-item mode-active" data-mode="dataset" data-tip="Browse and edit images in the current YOLO dataset." onclick="switchMode('dataset')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2z"/></svg>
        <span>Dataset</span>
        <div class="sidebar-badge">●</div>
      </div>
      <div class="sidebar-item" data-mode="live" data-tip="Browse Frigate event snapshots. Copy/move to dataset for training." onclick="switchMode('live')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49"/></svg>
        <span>Live</span>
      </div>
      <div class="sidebar-item" data-mode="video" data-tip="Frame-by-frame video analysis from Frigate exports." onclick="switchMode('video')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span>Video</span>
      </div>
    </div>
  </div>

  <!-- About & Help & Support — above GPU footer -->
  <div style="padding:0 8px;border-top:1px solid var(--bd)">
    <div class="sidebar-item" data-page="about" onclick="switchPage('about')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <span>About</span>
    </div>
    <div style="height:1px;background:var(--bd);margin:2px 10px"></div>
    <div class="sidebar-item" data-page="help" onclick="switchPage('help')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Help</span>
    </div>
    <div style="height:1px;background:var(--bd);margin:2px 10px"></div>
    <div class="sidebar-item" data-page="support" onclick="switchPage('support')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Support</span>
    </div>
  </div>

  <div class="sidebar-footer" id="sidebarGpuFooter" style="flex-direction:column;align-items:flex-start;gap:4px;padding:12px 16px">
    <div style="display:flex;align-items:center;gap:8px;width:100%">
      <div class="sidebar-gpu-dot" id="gpuDot"></div>
      <span id="gpuName" style="font-size:var(--fs-xs);color:var(--t1);font-family:var(--font);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">GPU: detecting...</span>
    </div>
    <div id="gpuDetails" style="font-size:var(--fs-xs);color:var(--t0);font-family:var(--font);line-height:1.6;width:100%;display:none">
      <div style="display:flex;justify-content:space-between"><span>Temp</span><span id="gpuDetTemp">-</span></div>
      <div style="display:flex;justify-content:space-between"><span>VRAM</span><span id="gpuDetVram">-</span></div>
      <div style="display:flex;justify-content:space-between"><span>Power</span><span id="gpuDetPower">-</span></div>
      <div style="display:flex;justify-content:space-between"><span>Load</span><span id="gpuDetUtil">-</span></div>
    </div>
  </div>

  <button class="sidebar-collapse-btn" id="sidebarToggle" onclick="toggleSidebar()">
    <span class="arrow">‹</span>
    <span class="label">Collapse</span>
  </button>
</div>
