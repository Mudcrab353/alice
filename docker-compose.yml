services:
  alice:
    build: .
    container_name: alice
    ports:
      - "8080:8080"
    volumes:
      # Config — persisted on host
      - ./alice.conf:/app/alice.conf

      # Datasets — read/write (Alice creates images + labels here)
      - /path/to/datasets:/datasets

      # Models — read/write (training output saved here)
      - /path/to/models:/models

      # Frigate media — read-only
      - /path/to/frigate/media/clips:/clips:ro
      - /path/to/frigate/media/exports:/exports:ro
      - /path/to/frigate/config/frigate.db:/frigate.db:ro
    restart: unless-stopped

    # GPU passthrough — remove this block if running CPU-only
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
